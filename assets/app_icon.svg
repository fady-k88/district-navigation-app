<svg width="1024" height="1024" viewBox="0 0 1024 1024" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>أطلس حدائق أكتوبر — App Icon</title>
  <desc>A compass rose app icon on a dark navy background with green accent</desc>

  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1F2B47"/>
      <stop offset="100%" stop-color="#1A1A2E"/>
    </radialGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2ECC71" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#2ECC71" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="centerGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3DDA80"/>
      <stop offset="100%" stop-color="#25A85C"/>
    </radialGradient>
    <linearGradient id="northGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2ECC71"/>
      <stop offset="100%" stop-color="#1EA05A"/>
    </linearGradient>
    <linearGradient id="southGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A3F5F"/>
      <stop offset="100%" stop-color="#1F2B47"/>
    </linearGradient>
    <linearGradient id="eastGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2A3F5F"/>
      <stop offset="100%" stop-color="#1F2B47"/>
    </linearGradient>
    <linearGradient id="westGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1F2B47"/>
      <stop offset="100%" stop-color="#2A3F5F"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1024" height="1024" rx="192" fill="url(#bgGrad)"/>

  <!-- Ambient glow -->
  <ellipse cx="512" cy="512" rx="340" ry="340" fill="url(#glowGrad)"/>

  <!-- Outer rings -->
  <circle cx="512" cy="512" r="460" fill="none" stroke="#2ECC71" stroke-width="2" stroke-opacity="0.18"/>
  <circle cx="512" cy="512" r="400" fill="none" stroke="#3A4A6B" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- Tick marks -->
  <g stroke="#3A4A6B" stroke-width="1.5" stroke-opacity="0.6">
    <line x1="512" y1="56"  x2="512" y2="84"/>
    <line x1="512" y1="940" x2="512" y2="968"/>
    <line x1="56"  y1="512" x2="84"  y2="512"/>
    <line x1="940" y1="512" x2="968" y2="512"/>
    <line x1="687" y1="99"  x2="677" y2="116"/>
    <line x1="337" y1="99"  x2="347" y2="116"/>
    <line x1="687" y1="925" x2="677" y2="908"/>
    <line x1="337" y1="925" x2="347" y2="908"/>
    <line x1="925" y1="337" x2="908" y2="347"/>
    <line x1="99"  y1="337" x2="116" y2="347"/>
    <line x1="925" y1="687" x2="908" y2="677"/>
    <line x1="99"  y1="687" x2="116" y2="677"/>
  </g>

  <!-- Cardinal labels -->
  <text x="512" y="44"  text-anchor="middle" font-family="'Cairo', sans-serif" font-size="48" font-weight="700" fill="#2ECC71" letter-spacing="3">N</text>
  <text x="512" y="998" text-anchor="middle" font-family="'Cairo', sans-serif" font-size="40" font-weight="500" fill="#3A4A6B">S</text>
  <text x="992" y="525" text-anchor="middle" font-family="'Cairo', sans-serif" font-size="40" font-weight="500" fill="#3A4A6B">E</text>
  <text x="32"  y="525" text-anchor="middle" font-family="'Cairo', sans-serif" font-size="40" font-weight="500" fill="#3A4A6B">W</text>

  <!-- Diagonal secondary points -->
  <g fill="#3A4A6B" opacity="0.5">
    <polygon points="687,196 695,220 687,244 679,220"/>
    <polygon points="337,196 345,220 337,244 329,220"/>
    <polygon points="687,780 695,804 687,828 679,804"/>
    <polygon points="337,780 345,804 337,828 329,804"/>
    <polygon points="780,337 804,345 828,337 804,329"/>
    <polygon points="196,337 220,345 244,337 220,329"/>
    <polygon points="780,687 804,695 828,687 804,679"/>
    <polygon points="196,687 220,695 244,687 220,679"/>
  </g>

  <!-- North arm — green -->
  <polygon points="512,196 492,512 512,468 532,512" fill="url(#northGrad)"/>
  <polygon points="512,196 512,468 532,512" fill="#3DDA80" opacity="0.5"/>

  <!-- South arm — dark -->
  <polygon points="512,828 492,512 512,556 532,512" fill="url(#southGrad)"/>
  <polygon points="512,828 512,556 532,512" fill="#16213E" opacity="0.6"/>

  <!-- East arm — dark -->
  <polygon points="828,512 512,492 556,512 512,532" fill="url(#eastGrad)"/>
  <polygon points="828,512 556,512 512,532" fill="#16213E" opacity="0.6"/>

  <!-- West arm — dark -->
  <polygon points="196,512 512,492 468,512 512,532" fill="url(#westGrad)"/>
  <polygon points="196,512 468,512 512,532" fill="#16213E" opacity="0.6"/>

  <!-- Diagonal arms -->
  <polygon points="687,337 512,492 536,536 540,504" fill="#2A3F5F" opacity="0.8"/>
  <polygon points="337,337 512,492 488,536 484,504" fill="#2A3F5F" opacity="0.8"/>
  <polygon points="687,687 512,532 536,488 540,520" fill="#16213E" opacity="0.8"/>
  <polygon points="337,687 512,532 488,488 484,520" fill="#16213E" opacity="0.8"/>

  <!-- Center jewel -->
  <circle cx="512" cy="512" r="64"  fill="#1A1A2E" stroke="#2ECC71" stroke-width="3"/>
  <circle cx="512" cy="512" r="48"  fill="url(#centerGrad)"/>
  <circle cx="512" cy="512" r="18"  fill="#1A1A2E"/>
  <circle cx="512" cy="512" r="9"   fill="#2ECC71"/>

  <!-- Inner ring -->
  <circle cx="512" cy="512" r="144" fill="none" stroke="#2ECC71" stroke-width="1.5" stroke-opacity="0.2"/>

  <!-- Icon border -->
  <rect x="0" y="0" width="1024" height="1024" rx="192" fill="none" stroke="#2ECC71" stroke-width="2" stroke-opacity="0.15"/>
</svg>
